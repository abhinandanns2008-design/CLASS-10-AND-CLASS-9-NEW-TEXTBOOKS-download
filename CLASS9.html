<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 9 Textbooks</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    /* Notebook background effect */
    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* Paper color */
        background-color: #fdfdf7;

        /* Notebook lines */
        background-image: 
            linear-gradient(to bottom, rgba(0,0,0,0.08) 1px, transparent 1px);
        background-size: 100% 35px;

        position: relative;
    }

    /* Left margin red line like notebook */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 80px;
        width: 2px;
        height: 100%;
        background: rgba(255, 0, 0, 0.25);
    }

    .container {
        background: rgba(255, 255, 255, 0.7);
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        width: 80%;
        max-width: 600px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        backdrop-filter: blur(3px);
    }

    h1 {
        color: #333;
        margin-bottom: 10px;
    }

    p {
        margin-bottom: 25px;
        color: #555;
    }

    .book-link {
        display: block;
        text-decoration: none;
        background: #4b6cb7;
        color: white;
        padding: 15px;
        margin: 12px 0;
        border-radius: 10px;
        font-size: 18px;
        transition: 0.3s;
    }

    .book-link:hover {
        background: #182848;
        transform: scale(1.03);
    }

    /* Credit */
    .credit {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px 15px;
        border-radius: 8px;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>📚 Class 9 Textbooks</h1>
    <p>Select a textbook below:</p>

    <a class="book-link" href="https://ncert.nic.in/textbook.php?iemh1=0-8" target="_blank">
        Mathematics Textbook
    </a>

    <a class="book-link" href="https://studywithshradha.in/ncert-books/class-9/science" target="_blank">
        Science Textbook
    </a>

    <a class="book-link" href="https://www.ncertbooks.guru/ncert-books-for-class-9-social-science/" target="_blank">
        Social Science Textbook
    </a>
</div>

<div class="credit">
    Designed and Created by <strong>Abhinandan N S</strong>
</div>

</body>
</html>
